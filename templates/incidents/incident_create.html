{% extends "base.html" %}

{% block title %}Create Incident | Smart City{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <p class="section-label">Citizen report</p>
        <h1>New incident</h1>
    </div>
</div>

<div class="content-panel form-panel">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                    <div class="form-text text-danger">{{ error }}</div>
                {% endfor %}
            </div>
        {% endfor %}
        <button class="btn btn-dark" type="submit">Create incident</button>
    </form>
</div>
{% endblock %}
