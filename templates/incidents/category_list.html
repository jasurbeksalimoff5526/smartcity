{% extends "base.html" %}

{% block title %}Categories | Smart City{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <p class="section-label">Admin</p>
        <h1>Categories</h1>
    </div>
    <a class="btn btn-dark" href="{% url 'incidents:category_create' %}">New category</a>
</div>

<div class="content-panel table-responsive">
    <table class="table align-middle mb-0">
        <thead>
            <tr>
                <th>Name</th>
                <th class="text-end">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
                <tr>
                    <td>{{ category.name }}</td>
                    <td class="text-end">
                        <a class="btn btn-outline-dark btn-sm" href="{% url 'incidents:category_update' category.pk %}">Edit</a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="2" class="text-center text-muted py-5">No categories yet.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
